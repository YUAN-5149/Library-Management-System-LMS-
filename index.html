// 封面上傳元件
function CoverUpload({value, onChange}){
  const ref=useRef();
  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){alert("圖片大小請勿超過 2MB");return;}
    const reader=new FileReader();
    reader.onload=ev=>onChange(ev.target.result);
    reader.readAsDataURL(file);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      <label style={{fontSize:11,fontWeight:600,color:"#9A3412"}}>封面圖片</label>
      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        <div onClick={()=>ref.current.click()} style={{width:72,height:100,border:"2px dashed "+(value?"#B87050":"#FDBA74"),borderRadius:8,overflow:"hidden",cursor:"pointer",flexShrink:0,background:"#FFF7ED",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",transition:"border 0.15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#B87050"} onMouseLeave={e=>e.currentTarget.style.borderColor=value?"#B87050":"#FDBA74"}>
          {value
            ?<img src={value} alt="cover" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            :<><div style={{fontSize:20,color:"#FDBA74",marginBottom:3}}>↑</div><div style={{fontSize:9,color:"#9A3412",textAlign:"center",lineHeight:1.4,padding:"0 4px"}}>點擊上傳</div></>
          }
          {value&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",opacity:0,transition:"opacity 0.15s"}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}><span style={{color:"#fff",fontSize:10,fontWeight:600}}>更換</span></div>}
        </div>
        <div style={{fontSize:10,color:"#9A3412",lineHeight:1.8,paddingTop:2}}>
          支援 JPG、PNG<br/>建議比例 5:7<br/>上限 2MB
          {value&&<button onClick={e=>{e.stopPropagation();onChange("");}} style={{display:"block",marginTop:5,padding:"2px 8px",background:"#FEE2E2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:5,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>✕ 移除</button>}
        </div>
      </div>
      <input ref={ref} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
    </div>
  );
}

// QR Code Modal
function QRModal({book, onClose}){
  const color=gc(book);
  const qrId=useRef("qrbox_"+book.id+"_"+Date.now()).current;
  const qrText="WB:"+book.id+"|"+(book.isbn||book.id);

  useEffect(()=>{
    let attempts=0;
    const tryInit=()=>{
      const el=document.getElementById(qrId);
      if(!el)return;
      if(typeof QRCode==="undefined"){
        if(++attempts<40)setTimeout(tryInit,100);
        return;
      }
      el.innerHTML="";
      new QRCode(el,{text:qrText,width:180,height:180,colorDark:"#431407",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.L});
    };
    const t=setTimeout(tryInit,80);
    return()=>clearTimeout(t);
  },[qrId]);

  const doPrint=()=>{
    const el=document.getElementById(qrId);
    const inner=el?el.innerHTML:"";
    const w=window.open("","_blank","width=420,height=520");

// PDF 上傳元件（供新增／編輯電子書表單使用）
function PDFUpload({pdfData, ebookUrl, onPdfChange, onUrlChange}){
  const ref=useRef();
  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>30*1024*1024){alert("PDF 大小請勿超過 30MB");return;}
    const reader=new FileReader();
    reader.onload=ev=>onPdfChange(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value="";
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:5,gridColumn:"1/-1"}}>
      <label style={{fontSize:11,fontWeight:600,color:"#9A3412"}}>PDF 來源</label>
      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
        <button type="button" onClick={()=>ref.current.click()} style={{padding:"6px 13px",borderRadius:6,border:"1.5px dashed "+(pdfData?"#10B981":"#FDBA74"),background:pdfData?"#F0FDF4":"#FFF7ED",color:pdfData?"#065F46":"#9A3412",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>
          {pdfData?"✓ PDF 已上傳（點擊更換）":"↑ 上傳 PDF 檔"}
        </button>
        {pdfData&&<button type="button" onClick={()=>onPdfChange("")} style={{padding:"4px 9px",borderRadius:6,border:"1px solid #FECACA",background:"#FEF2F2",color:"#DC2626",cursor:"pointer",fontSize:10,fontFamily:"inherit",flexShrink:0}}>✕ 移除</button>}
        <input value={ebookUrl||""} onChange={e=>onUrlChange(e.target.value)} placeholder="或填入線上 PDF / 網址 https://…" style={{flex:1,minWidth:130}}/>
      </div>
      <div style={{fontSize:9.5,color:"#B87050",lineHeight:1.6}}>上傳 PDF 存於瀏覽器記憶體（上限 30MB），重整後需重新上傳・或填入線上 PDF 網址持久保存</div>
      <input ref={ref} type="file" accept=".pdf,application/pdf" onChange={handleFile} style={{display:"none"}}/>
    </div>
  );
}

    else{setLe("帳號或密碼錯誤");setLp("");}
  };

  const avCp=bid=>{const bc=copies[bid]||[];const act=borrows.filter(b=>(b.status==="active"||b.status==="overdue")&&b.bookId===bid).map(b=>b.cid);return bc.filter(c=>!act.includes(c.cid));};
  const cpCnt=bid=>{const bc=copies[bid]||[];return{total:bc.length,avail:avCp(bid).length};};
  const avBks=books.filter(b=>{if(b.type!=="physical")return false;const bc=copies[b.id]||[];return bc.length===0?b.status==="available":avCp(b.id).length>0;});

  const doBorrow=()=>{
    if(!bf.memberId||!bf.bookId){toast("請選擇書目與會員");return;}
    const mid=parseInt(bf.memberId);

    const bid=parseInt(bf.bookId),avc=avCp(bid),cid=bf.cid||(avc.length>0?avc[0].cid:"");
    const d=new Date(),due=new Date(d);due.setDate(due.getDate()+parseInt(bf.days));

    const hds=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());

    const fv=(row,keys)=>{for(const k of keys){const v=row[k];if(v!==undefined&&v!==null&&String(v).trim())return String(v).trim();}return "";};
    const raw=lines.slice(1).map(line=>{const obj={};const vals=line.split(",").map(v=>v.replace(/^"|"$/g,"").trim());hds.forEach((h,i)=>{obj[h]=vals[i]||"";});return obj;}).filter(r=>Object.values(r).some(v=>v));

            <select value={bf.memberId} onChange={e=>setBf(p=>({...p,memberId:e.target.value}))}>
              <option value="">— 請選擇會員 —</option>
              {members.map(m=>{const cnt=borrows.filter(b=>b.memberId===m.id&&(b.status==="active"||b.status==="overdue")).length;return<option key={m.id} value={m.id}>{m.name}（{m.phone}）{cnt>=borrowLimit?" ⚠ 已達上限":cnt>0?" — 借閱中 "+cnt+"/"+borrowLimit:""}</option>;})}
            </select>
          </div>
          {bf.memberId&&(()=>{const cnt=borrows.filter(b=>b.memberId===parseInt(bf.memberId)&&(b.status==="active"||b.status==="overdue")).length;return cnt>=borrowLimit?<div style={{background:D("#FEF2F2","#3A1010"),border:"1px solid #FECACA",borderRadius:7,padding:"7px 10px",fontSize:11,color:"#DC2626",marginBottom:8}}>⚠ 此會員已借 {cnt} 本，達到上限（{borrowLimit} 本），無法新增借閱</div>:cnt>=borrowLimit-1?<div style={{background:D("#FEF3C7","#3A2A00"),border:"1px solid #FCD34D",borderRadius:7,padding:"7px 10px",fontSize:11,color:D("#92400E","#F0C060"),marginBottom:8}}>⚠ 此會員已借 {cnt}/{borrowLimit} 本，再借一本即達上限</div>:null;})()}
          <div className="fg"><label>借閱天數</label>
            <select value={bf.days} onChange={e=>setBf(p=>({...p,days:e.target.value}))}>
              {["7","14","30","60"].map(d=><option key={d}>{d} 天</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:7,marginTop:10}}><Btn c="確認借閱" onClick={doBorrow}/><Btn c="取消" v="o" onClick={()=>setModal(null)}/></div>
        </div>
      </div>}

      {modal==="member"&&<div style={{position:"fixed",inset:0,background:"rgba(60,18,5,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={()=>setModal(null)}>
        <div style={{background:D("#fff","#231508"),borderRadius:13,padding:18,width:400,maxWidth:"95vw",border:"1px solid "+D("#FDBA74","#3A2010")}} onClick={e=>e.stopPropagation()}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:14,color:D("#431407","#F0D5A5"),marginBottom:9}}>新增會員</div>
          <div className="fg"><label>姓名 *</label><input placeholder="請輸入姓名" value={nm.name} onChange={e=>setNm(p=>({...p,name:e.target.value}))}/></div>
          <div className="fg"><label>Email</label><input type="email" placeholder="email@fire.gov.tw" value={nm.email} onChange={e=>setNm(p=>({...p,email:e.target.value}))}/></div>
          <div className="fg"><label>電話</label><input placeholder="0912-345-678" value={nm.phone} onChange={e=>setNm(p=>({...p,phone:e.target.value}))}/></div>
          <div style={{display:"flex",gap:7,marginTop:10}}><Btn c="確認新增" onClick={doAddMem}/><Btn c="取消" v="o" onClick={()=>setModal(null)}/></div>
        </div>
      </div>}

      {/* 書目編輯 Modal */}
      {editBook&&<div style={{position:"fixed",inset:0,background:"rgba(60,18,5,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={()=>setEditBook(null)}>
        <div style={{background:D("#fff","#231508"),borderRadius:14,padding:"20px 22px",width:580,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto",border:"1px solid "+D("#FDBA74","#3A2010"),position:"relative"}} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>setEditBook(null)} style={{position:"absolute",top:10,right:13,background:"none",border:"none",fontSize:16,cursor:"pointer",color:"#9A3412"}}>×</button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:12,borderBottom:"2px solid #FED7AA"}}>
            <Cover book={editBook} w={36} h={50}/>
            <div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:15,color:"#431407",fontWeight:700}}>編輯書目資料</div>
              <div style={{fontSize:10,color:"#9A3412",marginTop:2}}>ID: {editBook.id} · 修改後點擊儲存</div>
            </div>
          </div>
          <div style={{display:"flex",gap:14,marginBottom:14,paddingBottom:12,borderBottom:"1px solid #FFF3E0"}}>
            <CoverUpload value={editBook.cover||""} onChange={v=>setEditBook(p=>({...p,cover:v}))}/>
            <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <div className="fg"><label>書名 *</label><input value={editBook.title} onChange={e=>setEditBook(p=>({...p,title:e.target.value}))}/></div>
              <div className="fg"><label>作者</label><input value={editBook.author} onChange={e=>setEditBook(p=>({...p,author:e.target.value}))}/></div>
              <div className="fg"><label>分類</label>
                <select value={editBook.category} onChange={e=>setEditBook(p=>({...p,category:e.target.value}))}>
                  {CATS.map(c=><option key={c} value={c}>[{KOD[c]}] {c}</option>)}
                </select>
              </div>
              <div className="fg"><label>出版年</label><input value={editBook.publishYear||""} onChange={e=>setEditBook(p=>({...p,publishYear:e.target.value}))}/></div>
              <div className="fg"><label>ISBN</label><input value={editBook.isbn||""} onChange={e=>setEditBook(p=>({...p,isbn:e.target.value}))}/></div>
              {editBook.type==="physical"
                ?<div className="fg"><label>書況</label>
                  <select value={editBook.condition} onChange={e=>setEditBook(p=>({...p,condition:e.target.value}))}>
                    {["全新","良好","普通","破損"].map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                :<PDFUpload pdfData={editBook.pdfData||""} ebookUrl={editBook.ebookUrl||""} onPdfChange={v=>setEditBook(p=>({...p,pdfData:v}))} onUrlChange={v=>setEditBook(p=>({...p,ebookUrl:v}))}/>
              }
            </div>
          </div>
          <div className="fg"><label>書籍簡介</label><textarea rows={3} value={editBook.desc||""} onChange={e=>setEditBook(p=>({...p,desc:e.target.value}))} style={{resize:"vertical"}}/></div>
          <div style={{background:"#FFF7ED",borderRadius:8,padding:10,marginBottom:12,border:"1px solid #FDBA74",fontSize:11,color:"#9A3412"}}>
            <b>注意：</b>書目類型（實體書/電子書）與入館日期不可修改。目前狀態：
            <Tag c={editBook.status==="available"?"可借閱":"借出中"} s={{...editBook.status==="available"?{background:"#D1FAE5",color:"#065F46"}:{background:"#FEE2E2",color:"#991B1B"},marginLeft:6}}/>
          </div>
          <div style={{display:"flex",gap:8}}><Btn c="✓ 儲存變更" onClick={doSaveEdit}/><Btn c="取消" v="o" onClick={()=>setEditBook(null)}/></div>
        </div>
      </div>}

      {/* QR Code Modal */}
      {qrBook&&<QRModal book={qrBook} onClose={()=>setQrBook(null)}/>}

      {pdfViewer&&<PDFViewerModal book={pdfViewer} onClose={()=>setPdfViewer(null)}/>}

      {!isAP&&(
        <button className="fab" onClick={()=>setShowBorrow(true)} title="掃碼借閱">
          📷
        </button>
      )}

      {showBorrow&&(
        <div className="bm-ov" onClick={()=>setShowBorrow(false)}>
          <div className="bm-box" onClick={e=>e.stopPropagation()}>
            <div className="bm-hdr">
              <div style={{color:"#fff",fontWeight:700,fontSize:13,fontFamily:"'Playfair Display',serif",display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:16}}>📷</span> 掃碼借閱系統
              </div>
              <button onClick={()=>setShowBorrow(false)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
            </div>
            <iframe
              src="./borrow/"
              style={{flex:1,border:"none",width:"100%"}}
              title="掃碼借閱系統"
              allow="camera; microphone"
            />
          </div>
        </div>
      )}

      <div className="tw">{toasts.map(t=><div key={t.id} className="tst">{t.msg}</div>)}</div>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
